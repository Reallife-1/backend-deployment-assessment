version: "3.3"

services:
  backend:
    image: muchotodo-backend:latest
    container_name: muchotodo-backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - PORT=8080
      - MONGO_URI=mongodb://mongodb:27017/much_todo_db
      - DB_NAME=much_todo_db
      - JWT_SECRET_KEY=change-this-secret
      - JWT_EXPIRATION_HOURS=72
      - LOG_LEVEL=INFO
      - LOG_FORMAT=json
    depends_on:
      - mongodb
    restart: unless-stopped
    networks:
      - app-network

  mongodb:
    image: mongo:6.0
    container_name: muchotodo-mongodb
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    networks:
      - app-network

volumes:
  mongo_data:

networks:
  app-network:
    driver: bridge